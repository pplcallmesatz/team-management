<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Planning Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="d-flex">
  <aside class="sidebar bg-dark text-white p-3">
    <h5 class="mb-3">Admin Menu</h5>
    <ul class="nav flex-column gap-2">
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="dashboard">Dashboard</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="resources">Resources</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="resourceTypes">Resource Types</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="projects">Projects</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="allocations">Allocations (Actual)</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="skills">Skill Matrix</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="scenarios">Projection Scenarios</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="timeline">Projection Timeline View</button></li>
      <li><button class="btn btn-sm btn-outline-light w-100 menu-btn" data-section="reports">Reports Export (CSV)</button></li>
    </ul>
  </aside>

  <main class="container-fluid p-4">
    <section id="dashboardSection" class="app-section">
      <h3>Dashboard</h3>
      <div id="dashboardCards" class="row g-3 my-2"></div>
      <div class="row mt-3">
        <div class="col-md-6"><canvas id="spendRevenueChart"></canvas></div>
        <div class="col-md-6"><canvas id="utilizationChart"></canvas></div>
      </div>
    </section>

    <section id="resourcesSection" class="app-section d-none">
      <h3>Resources</h3>
      <input id="resourceSearch" class="form-control mb-2" placeholder="Search resources by name" />
      <div class="table-responsive"><table class="table table-sm table-striped" id="resourcesTable"></table></div>
    </section>

    <section id="resourceTypesSection" class="app-section d-none"><h3>Resource Types</h3><div class="table-responsive"><table class="table table-sm" id="resourceTypesTable"></table></div></section>
    <section id="projectsSection" class="app-section d-none"><h3>Projects</h3><div class="table-responsive"><table class="table table-sm" id="projectsTable"></table></div></section>
    <section id="allocationsSection" class="app-section d-none"><h3>Allocations</h3><div class="table-responsive"><table class="table table-sm" id="allocationsTable"></table></div></section>
    <section id="skillsSection" class="app-section d-none"><h3>Skill Matrix</h3><div class="table-responsive"><table class="table table-sm" id="skillsTable"></table></div></section>

    <section id="scenariosSection" class="app-section d-none">
      <h3>Projection Scenarios</h3>
      <div class="table-responsive"><table class="table table-sm" id="scenariosTable"></table></div>
    </section>

    <section id="timelineSection" class="app-section d-none">
      <h3>Projection Timeline</h3>
      <div class="row g-2 align-items-end mb-3">
        <div class="col-md-4">
          <label class="form-label">Scenario</label>
          <select id="scenarioSelect" class="form-select"></select>
        </div>
        <div class="col-md-2"><button id="loadTimeline" class="btn btn-primary w-100">Load</button></div>
      </div>
      <div class="table-responsive"><table class="table table-bordered table-sm" id="timelineTable"></table></div>
      <canvas id="projectionChart"></canvas>
      <h5 class="mt-4">Project-wise Timeline</h5>
      <div class="table-responsive"><table class="table table-sm" id="projectTimelineTable"></table></div>
      <h5 class="mt-4">Bench Forecast List</h5>
      <div class="row g-2 mb-2"><div class="col-md-4"><input id="benchMonth" type="month" class="form-control" /></div><div class="col-md-2"><button id="loadBench" class="btn btn-secondary">Load Bench</button></div></div>
      <div class="table-responsive"><table class="table table-sm" id="benchTable"></table></div>
    </section>

    <section id="reportsSection" class="app-section d-none">
      <h3>Reports Export</h3>
      <button id="downloadCsv" class="btn btn-success">Download Scenario Summary CSV</button>
      <p class="text-muted mt-2">CSV exports month-wise projection summary for selected scenario.</p>
    </section>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
